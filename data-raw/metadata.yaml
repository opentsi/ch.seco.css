# OpenTSI Dataset Metadata
# ========================
# This file describes your dataset for the OpenTSI ecosystem.
# Fill in the fields below and run deloRean::validate_metadata() to check.
#
# Key pattern: country.provider.dataset.dimension.variable.unit
# Example: ch.seco.css.frequency.type.seas_adj.structure

# Dataset identity (required)
# These form the first three segments of every key
country: "ch"
provider: "seco"
dataset: "css"

# Dataset title (required)
title:
  en: "Consumer sentiment index"
  de: "Konsumentenstimmungsindex"
  fr: "Indice du climat de consommation"
  it: "Indice del clima di fiducia dei consumatori"

# Data source name (required)
source_name:
  en: "State Secretariat for Economic Affairs (SECO)"
  de: "Staatssekretariat für Wirtschaft (SECO)"
  fr: "Secrétariat d'Etat à l'économie (SECO)"
  it: "Segretaria di Stato dell'economia (SECO)"

# URL to original data source (required)
source_url: "https://www.seco.admin.ch/seco/de/home/wirtschaftslage---wirtschaftspolitik/Wirtschaftslage/konsumentenstimmung/daten-ab-1972.html"

# Data frequency (required)
# D = daily, W = weekly, M = monthly, Q = quarterly, Y = yearly, I = irregular
dataset_frequency: "Q"

# Units of measurement
# Use "all" if uniform across variables, or specify per variable key
units:
  index:
    en: "Index"
    de: "Index"
    fr: "Indice"
    it: "Indice"
  sd:
    en: "Standard deviation"
    de: "Standardabweichung"
    fr: "Écart-type"
    it: "Deviazione standard"

# Aggregation method for temporal aggregation
# Valid values: mean, sum, last, first
aggregate:
  all: "mean"

# Dimension order (left to right in the key, after country.provider.dataset)
dim_order:
  - frequency
  - type
  - seas_adj
  - structure

# Hierarchical structure of dimensions
hierarchy:
  structure:
    i63_index: {}
    i11_econ_hist: {}
    i12_econ_exp: {}
    i21_price_hist: {}
    i22_price_exp: {}
    i31_job_secure: {}
    i32_unemp_exp: {}
    i41_fin_pos_hist: {}
    i42_fin_pos_exp: {}
    i51_save: {}
    i52_spend: {}
    i53_save_exp: {}
    i62_index: {}
    i23_price_exp_5: {}
    i54_spend_exp: {}

